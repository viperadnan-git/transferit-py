name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}

jobs:
  deploy:
    name: Build, publish, and release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/transferit-py

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Tests (offline)
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # PEP 440 pre-release? (aN / bN / rcN / .devN)
          PRERELEASE_FLAG=""
          if [[ "${VERSION}" =~ (a|b|rc|\.dev)[0-9] ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Fetch categorised notes from GitHub's native generator
          # (driven by .github/release.yml).
          AUTO_NOTES=$(gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG}" \
            --jq .body)

          {
            echo "## Install"
            echo
            echo '```bash'
            echo "pip install 'transferit-py==${VERSION}'"
            echo "pip install 'transferit-py[cli]==${VERSION}'   # with CLI"
            echo '```'
            echo
            echo "PyPI: https://pypi.org/project/transferit-py/${VERSION}/"
            echo
            echo "${AUTO_NOTES}"
          } > /tmp/release-notes.md

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release-notes.md \
            --verify-tag \
            ${PRERELEASE_FLAG} \
            dist/*
